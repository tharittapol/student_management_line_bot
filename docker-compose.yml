services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-linebot}
      POSTGRES_USER: ${POSTGRES_USER:-linebot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-linebot_password}
      TZ: Asia/Bangkok
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-linebot} -d ${POSTGRES_DB:-linebot}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  line-bot:
    build: .
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8080"
      TZ: Asia/Bangkok
      DATABASE_URL: postgres://${POSTGRES_USER:-linebot}:${POSTGRES_PASSWORD:-linebot_password}@postgres:5432/${POSTGRES_DB:-linebot}?sslmode=disable
      DB_SCHEMA_PATH: db/schema.sql
      AUTO_MIGRATE: "true"
    ports:
      - "${HOST_PORT:-8080}:8080"
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    depends_on:
      - line-bot
    command:
      - http
      - http://line-bot:8080
      - --log=stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "${NGROK_INSPECTOR_PORT:-4040}:4040"
    restart: unless-stopped

volumes:
  postgres-data:
